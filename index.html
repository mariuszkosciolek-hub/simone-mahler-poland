<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ivory:#f7f3ec;--ivory-2:#f1ebe1;--beige:#ece4d7;--champagne:#d9c4a3;
    --champagne-2:#c8ad84;--taupe:#a8997f;--brown:#5a4a3a;--brown-deep:#3b332b;
    --soft-black:#2a2520;--ink:#38322b;--muted:#7d7363;--line:#e1d8c9;
    --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',-apple-system,Segoe UI,sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--ink);font-weight:300;
    background:
      radial-gradient(1100px 620px at 50% -10%, rgba(217,196,163,.35), transparent 60%),
      radial-gradient(900px 500px at 85% 110%, rgba(140,148,130,.16), transparent 55%),
      linear-gradient(180deg,var(--ivory),var(--ivory-2));
    min-height:100svh;display:grid;place-items:center;padding:28px;
  }
  .gate{
    width:min(420px,100%);text-align:center;
    background:#fbf8f2;border:1px solid var(--champagne);border-radius:20px;
    box-shadow:0 10px 40px rgba(58,45,32,.10),0 30px 80px rgba(58,45,32,.10);
    padding:48px 40px 40px;position:relative;overflow:hidden;
    animation:rise .6s var(--ease) both;
  }
  .gate::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--champagne),var(--champagne-2),transparent)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .mark{
    width:54px;height:54px;border-radius:50%;margin:0 auto 22px;display:grid;place-items:center;
    font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:.04em;color:var(--ivory);
    background:linear-gradient(145deg,var(--brown),var(--brown-deep));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 4px 16px rgba(58,45,32,.12);
  }
  .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--taupe);margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:500;font-size:2rem;line-height:1.1;color:var(--soft-black);letter-spacing:.01em}
  .sub{font-size:.92rem;color:var(--muted);margin-top:10px;line-height:1.6}
  form{margin-top:30px;display:flex;flex-direction:column;gap:14px;text-align:left}
  label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);font-weight:500;margin-bottom:7px;display:block}
  input{
    width:100%;font-family:var(--sans);font-size:1rem;color:var(--ink);font-weight:300;
    background:var(--ivory);border:1px solid var(--line);border-radius:10px;padding:13px 15px;
    transition:border-color .3s var(--ease),box-shadow .3s var(--ease);
  }
  input:focus{outline:none;border-color:var(--champagne-2);box-shadow:0 0 0 3px rgba(217,196,163,.28)}
  button{
    margin-top:8px;width:100%;font-family:var(--sans);font-size:13px;font-weight:500;
    letter-spacing:.13em;text-transform:uppercase;color:var(--ivory);cursor:pointer;
    background:linear-gradient(145deg,var(--brown),var(--brown-deep));border:none;border-radius:50px;
    padding:15px 24px;transition:transform .3s var(--ease),box-shadow .3s var(--ease);
    box-shadow:0 4px 16px rgba(58,45,32,.12);
  }
  button:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(58,45,32,.16)}
  button:disabled{opacity:.6;cursor:wait;transform:none}
  .err{min-height:18px;font-size:.84rem;color:#9a5a48;margin-top:4px;text-align:center;opacity:0;transition:opacity .3s}
  .err.show{opacity:1}
  .foot{margin-top:26px;font-size:11px;letter-spacing:.06em;color:var(--taupe);text-transform:uppercase}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
</style>
</head>
<body>
  <main class="gate" id="gate">
    <div class="mark">SM</div>
    <p class="eyebrow">Selective Institute · Private</p>
    <h1>Simone Mahler in Poland</h1>
    <p class="sub">B2B Client Profile &amp; 3-Year Business Development Plan.<br />Please sign in to view the brief.</p>
    <form id="loginForm" autocomplete="off">
      <div>
        <label for="u">Username</label>
        <input id="u" name="u" type="text" autocapitalize="none" autocorrect="off" spellcheck="false" required />
      </div>
      <div>
        <label for="p">Password</label>
        <input id="p" name="p" type="password" required />
      </div>
      <button type="submit" id="btn">Enter</button>
      <p class="err" id="err" role="alert">Incorrect username or password.</p>
    </form>
    <p class="foot">Confidential business brief</p>
  </main>

  var form = document.getElementById('loginForm');
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  var gate = document.getElementById('gate');

  function b2u(b64){ var s=atob(b64), a=new Uint8Array(s.length); for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }

  async function unlock(user, pass){
    var enc = new TextEncoder();
    var base = await crypto.subtle.importKey('raw', enc.encode(user.trim().toLowerCase()+':'+pass), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b2u(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    var buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(ENC.iv) }, key, b2u(ENC.ct));
    return new TextDecoder().decode(buf);
  }

  function fail(){
    err.classList.add('show');
    gate.classList.remove('shake'); void gate.offsetWidth; gate.classList.add('shake');
    btn.disabled=false; btn.textContent='Enter';
    document.getElementById('p').select();

  function render(appHtml){
    // Render the decrypted app inside a full-window same-origin iframe.
    // (srcdoc reliably runs the inlined script; document.write after load does not.)
    document.title = 'Simone Mahler in Poland';
    var f = document.createElement('iframe');
    f.title = 'Simone Mahler in Poland';
    f.setAttribute('allow', 'clipboard-write; fullscreen');
    f.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:0;margin:0;background:#f7f3ec';
    document.documentElement.style.cssText = 'height:100%;margin:0';
    document.body.style.cssText = 'height:100%;margin:0;background:#f7f3ec';
    document.body.innerHTML = '';
    document.body.appendChild(f);
    f.srcdoc = appHtml;

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.classList.remove('show');
    btn.disabled=true; btn.textContent='Opening…';
    var u=document.getElementById('u').value, p=document.getElementById('p').value;
    try{
      var html = await unlock(u, p);
      if(!/^<!DOCTYPE html>/i.test(html.trim())) throw new Error('bad');

    }catch(_){ fail(); }

    err.textContent='This browser does not support secure unlocking. Please use a modern browser.';
    err.classList.add('show');
